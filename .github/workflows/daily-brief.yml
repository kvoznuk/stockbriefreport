name: Daily Pre-Market Brief

# Runs every weekday at ~8:45am ET. GH Actions cron is in UTC; we schedule
# both 12:45 UTC (covers EDT, Mar–Nov) and 13:45 UTC (covers EST, Nov–Mar).
# The Python script's ET time-window guard (8:30-9:00am ET) ensures only the
# correct trigger actually runs each day.
on:
  schedule:
    - cron: '45 12 * * 1-5'
    - cron: '45 13 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run (skip ET time-window guard)'
        required: false
        default: 'true'

permissions:
  contents: write   # so the workflow can commit docs/index.html back

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLIC_BRIEF_URL: ${{ vars.PUBLIC_BRIEF_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            python -m src.main --force
          else
            python -m src.main
          fi

      - name: Commit updated brief
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit (likely outside run window)."
          else
            git commit -m "brief: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
